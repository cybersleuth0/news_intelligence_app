<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3713ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden">
<!-- Main Brand Container -->
<div class="flex flex-col items-center justify-center space-y-6">
<!-- Icon Wrapper -->
<div class="flex h-24 w-24 items-center justify-center rounded-2xl bg-primary/10 text-primary ring-1 ring-primary/20">
<span class="material-symbols-outlined !text-6xl" data-icon="newspaper">
                    newspaper
                </span>
</div>
<!-- App Name -->
<div class="text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-5xl font-bold tracking-tight">
                    NewsIQ
                </h1>
<p class="mt-2 text-slate-500 dark:text-slate-400 text-sm font-medium tracking-widest uppercase">
                    Stay Informed
                </p>
</div>
</div>
<!-- Bottom Loading Section -->
<div class="absolute bottom-20 flex w-full max-w-xs flex-col items-center gap-4 px-4">
<div class="flex w-full items-center justify-between px-1">
<p class="text-slate-600 dark:text-slate-400 text-xs font-medium">Syncing headlines...</p>
<p class="text-primary text-xs font-bold">30%</p>
</div>
<!-- Progress Bar -->
<div class="h-1.5 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-800">
<div class="h-full rounded-full bg-primary" style="width: 30%;"></div>
</div>
</div>
<!-- Footer Decoration -->
<div class="absolute bottom-8 text-center">
<p class="text-slate-400 dark:text-slate-600 text-[10px] font-semibold uppercase tracking-[0.2em]">
                Powered by AI Intelligence
            </p>
</div>
<!-- Background Subtle Gradient Decor -->
<div class="pointer-events-none absolute -top-24 -left-24 h-64 w-64 rounded-full bg-primary/5 blur-3xl"></div>
<div class="pointer-events-none absolute -bottom-24 -right-24 h-64 w-64 rounded-full bg-primary/10 blur-3xl"></div>
</div>
</body></html>
